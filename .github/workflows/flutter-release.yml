name: Flutter Android Release

on:
  push:
    tags:
      - "v*.*.*"   # runs only when you push a tag like v1.2.3

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          cd client
          flutter pub get

      - name: Build APK
        run: |
          cd client
          flutter build apk --release
          VERSION=${GITHUB_REF_NAME}
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/app-$VERSION.apk

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: client/build/app/outputs/flutter-apk/app-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
