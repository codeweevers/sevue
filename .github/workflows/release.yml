name: Sevue Release

on:
  push:
    tags:
      - "v*.*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows app (PyInstaller)
        shell: powershell
        run: |
          Push-Location train_installer_gen
          pyinstaller sevue.spec --noconfirm --clean
          Pop-Location

      - name: Bump installer version in Inno script
        shell: powershell
        run: |
          $iss = "train_installer_gen\installer scrypt.iss"
          $content = Get-Content $iss -Raw
          $content = $content -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$env:VERSION`""
          Set-Content -Path $iss -Value $content -Encoding UTF8

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: powershell
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "train_installer_gen\installer scrypt.iss"

      - name: Collect Windows artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item "train_installer_gen\release\sevue_installer.exe" "artifacts\sevue-windows-installer-v$env:VERSION.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/*

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rpm zip build-essential patchelf
          sudo gem install --no-document fpm
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Linux app (PyInstaller)
        run: |
          cd train_installer_gen
          pyinstaller sevue.spec --noconfirm --clean

      - name: Prepare Linux package root
        run: |
          chmod +x packaging/linux/hooks/postinst.sh packaging/linux/hooks/postrm.sh
          rm -rf pkgroot artifacts
          mkdir -p pkgroot/opt/sevue pkgroot/usr/bin pkgroot/usr/share/applications artifacts
          cp -a train_installer_gen/dist/sevue/. pkgroot/opt/sevue/
          cat > pkgroot/usr/bin/sevue <<'EOF'
          #!/usr/bin/env bash
          exec /opt/sevue/sevue "$@"
          EOF
          chmod +x pkgroot/usr/bin/sevue
          cat > pkgroot/usr/share/applications/sevue.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Sevue
          Comment=Real-time sign language interpretation
          Exec=/usr/bin/sevue
          Terminal=false
          Categories=Utility;AudioVideo;
          EOF

      - name: Build Linux packages with fpm (deb/rpm)
        run: |
          fpm -s dir -t deb \
            -n sevue \
            -v "$VERSION" \
            -a amd64 \
            --description "Sevue desktop app with virtual camera support" \
            --url "https://github.com/${{ github.repository }}" \
            --license "GPLv3" \
            --maintainer "CodeWeevers" \
            --after-install packaging/linux/hooks/postinst.sh \
            --after-remove packaging/linux/hooks/postrm.sh \
            -C pkgroot \
            -p artifacts/sevue_${VERSION}_amd64.deb \
            opt/sevue usr/bin/sevue usr/share/applications/sevue.desktop

          fpm -s dir -t rpm \
            -n sevue \
            -v "$VERSION" \
            -a x86_64 \
            --description "Sevue desktop app with virtual camera support" \
            --url "https://github.com/${{ github.repository }}" \
            --license "GPLV3" \
            --maintainer "CodeWeevers" \
            --after-install packaging/linux/hooks/postinst.sh \
            --after-remove packaging/linux/hooks/postrm.sh \
            -C pkgroot \
            -p artifacts/sevue-${VERSION}-1.x86_64.rpm \
            opt/sevue usr/bin/sevue usr/share/applications/sevue.desktop

      - name: Build Linux binary zip
        run: |
          cd train_installer_gen/dist
          zip -r ../../artifacts/sevue-linux-binary-v${VERSION}.zip sevue

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Sevue ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
